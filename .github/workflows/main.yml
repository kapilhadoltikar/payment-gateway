name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: "21"

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Build and Test with Maven
        env:
          MAVEN_OPTS: "-Xmx6g"
        run: mvn clean verify -Dnative.skip=true -U

      - name: Archive generated documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: "**/target/generated-docs"
          if-no-files-found: ignore

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: true

  cd:
    name: Continuous Deployment
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          [
            api-gateway,
            auth-service,
            payment-service,
            merchant-service,
            vault-service,
            notification-service,
            fraud-service,
          ]
        include:
          - service: api-gateway
            is_native: true
          - service: auth-service
            is_native: true
          - service: payment-service
            is_native: false
          - service: merchant-service
            is_native: true
          - service: vault-service
            is_native: true
          - service: notification-service
            is_native: true
          - service: fraud-service
            is_native: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Swap Space (10GB)
        run: |
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl vm.swappiness=10
          df -h
          free -m

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Container Image via Spring Boot Buildpacks
        env:
          MAVEN_OPTS: "-Xmx8g"
        run: |
          mvn spring-boot:build-image \
            -${{ matrix.is_native == true && '-Pnative' || '-Pjvm' }} \
            -pl ${{ matrix.service }} -am \
            -DskipTests

      - name: Tag and Push to Github Packages (GHCR)
        run: |
          LOCAL_IMAGE="payment-gateway/${{ matrix.service }}:1.0.0-SNAPSHOT"
          TARGET_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest"
          TARGET_IMAGE_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}"
          
          docker tag $LOCAL_IMAGE $TARGET_IMAGE_LATEST
          docker tag $LOCAL_IMAGE $TARGET_IMAGE_SHA
          
          docker push $TARGET_IMAGE_LATEST
          docker push $TARGET_IMAGE_SHA
