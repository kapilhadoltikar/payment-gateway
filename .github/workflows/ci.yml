name: Payment Gateway CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: "21"

jobs:
  build-and-test:
    name: Maven Compile and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      # We run tests here dynamically across your codebase to capture regressions
      - name: Build and Test with Maven
        env:
          MAVEN_OPTS: "-Xmx5g"
        run: mvn clean verify -Dnative.skip=true -U


  container-build:
    name: Verify JVM Container
    needs: build-and-test # Enforces that tests must pass before building containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false # Continues building other services even if one fails (great for debugging)
      matrix:
        service:
          [
            api-gateway,
            auth-service,
            payment-service,
            merchant-service,
            vault-service,
            notification-service,
            fraud-service,
          ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      # --- STEP A: REGISTRY AUTHENTICATION (Only when actual code is merging to main) ---
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- STEP B: SPRING BOOT IMAGE BUILD (Runs on BOTH PRs and Merges to prevent failures) ---
      - name: Publish JVM Container Image via Buildpacks
        env:
          MAVEN_OPTS: "-Xmx6g"
          # force to use docker demon
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          mvn clean install -N -DskipTests
          
          mvn clean install -pl common -DskipTests
          
          mvn spring-boot:build-image -pl ${{ matrix.service }} -DskipTests

      # --- STEP C: PUSH TO PACKAGES REGISTRY (Only when actual code is merging to main) ---
      - name: Tag and Push JVM Images to GHCR
        if: github.event_name == 'push'
        run: |
          LOCAL_IMAGE="payment-gateway/${{ matrix.service }}:1.0.0-SNAPSHOT"
          TARGET_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest-jvm"
          TARGET_IMAGE_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}-jvm"
          
          docker tag $LOCAL_IMAGE $TARGET_IMAGE_LATEST
          docker tag $LOCAL_IMAGE $TARGET_IMAGE_SHA
          
          docker push $TARGET_IMAGE_LATEST
          docker push $TARGET_IMAGE_SHA
